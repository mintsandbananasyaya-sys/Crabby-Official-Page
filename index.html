<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crabby Civilization</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
    font-family: 'Inter', sans-serif;
    color:white;
    height:100vh;
    overflow:hidden;
    background:black;
}

/* BACKGROUND IMAGE */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    background:url("https://static.planetminecraft.com/files/resource_media/screenshot/1904/greek-2-9-1548372302_lrg.jpg") center/cover no-repeat;
    z-index:-3;
    transform:scale(1.1);
    animation:zoom 20s ease-in-out infinite alternate;
}

@keyframes zoom {
    from {transform:scale(1.1);}
    to {transform:scale(1.2);}
}

/* DARK OVERLAY */
.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, rgba(0,0,0,0.4), rgba(0,0,0,0.95));
    z-index:-2;
}

/* PARTICLES */
canvas {
    position:absolute;
    width:100%;
    height:100%;
    z-index:-1;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 1100px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 12px 20px;
  border-radius: 16px;

  background: rgba(10,15,25,0.85);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(0,212,255,0.2);
  box-shadow: 0 0 25px rgba(0,212,255,0.15);

  z-index: 1000;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
}

.logo-icon {
  width:30px;
  height:30px;
  border-radius:8px;
  background:#00d4ff;
}

.nav-links {
  display:flex;
  gap:25px;
}

.nav-links a {
  color:#00d4ff;
  text-decoration:none;
  font-weight:500;
  opacity:0.8;
  transition:0.3s;
}

.nav-links a:hover {
  opacity:1;
  text-shadow:0 0 10px #00d4ff;
}

.nav-btn {
  padding:8px 16px;
  border-radius:10px;
  background:#00d4ff;
  color:black;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

/* RIGHT BUTTON */
.nav-button {
  background: linear-gradient(135deg, #00d4ff, #00ffaa);
  color: black;

  padding: 10px 18px;
  border-radius: 10px;

  font-size: 14px;
  font-weight: 600;

  border: none;
  cursor: pointer;
}

/* HERO */
.hero {
    height:100%;
    display:flex;
    align-items:center;
    padding-left:10%;
   padding-top: 120px; /* 🔥 pushes content below navbar */
}

/* TEXT */
.text h1 {
    font-size:80px;
    line-height:1.1;
    animation:fadeUp 1s ease forwards;
}

.highlight {
    color:#00d4ff;
    text-shadow:0 0 20px #00d4ff;
}

.text p {
    margin-top:20px;
    opacity:0.8;
    max-width:1100px;
    animation:fadeUp 1.5s ease forwards;
}

/* BUTTONS */
.buttons {
    margin-top:30px;
    animation:fadeUp 2s ease forwards;
}

button {
    padding:14px 30px;
    border:none;
    border-radius:10px;
    margin-right:15px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.apply {
    background:#00d4ff;
    color:black;
    box-shadow:0 0 20px #00d4ff;
}

.enter {
    background:transparent;
    border:1px solid #00d4ff;
    color:#00d4ff;
}

button:hover {
    transform:scale(1.08);
    box-shadow:0 0 30px #00d4ff;
}

/* FADE ANIMATION */
@keyframes fadeUp {
    from {
        opacity:0;
        transform:translateY(40px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<canvas id="particles"></canvas>

<div class="navbar">

  <div class="logo">
    <div class="logo-icon"></div>
    Crabby Events
  </div>

  <div class="nav-links">
    <a href="index.html">Index</a>
    <a href="home.html">Home</a>
    <a href="apply.html">Apply</a>
    <a href="forms.html">Forms</a>
    <a href="staff.html">Staff</a>
  </div>

  <button class="nav-btn">Discord</button>

</div>

<div class="hero">
<div class="text">

<p>SEASON 3 — FINISHED</p>

<h1>
CRABBY'S<br>
<span class="highlight">CIVILIZATION</span>
</h1>

<p>
Build empires. Wage wars. Form alliances.  
Dominate a world where only the strongest survive.
</p>
<p>
OFFICIAL WEBSITE
</p>

<div class="buttons">
<a href="home.html"><button class="enter">Enter Site</button></a>
</div>

</div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.y -= p.speed;
        if(p.y < 0) p.y = canvas.height;

        ctx.fillStyle="rgba(0,212,255,0.7)";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
